<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opción A · Marco editorial</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #0a0b0a;
      --paper: #f4f1e8;
      --acid: #b9eb8b;
      --rule: rgba(244, 241, 232, 0.2);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: "IBM Plex Mono", "Courier New", monospace;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 320px;
      isolation: isolate;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.85) 0%, rgba(5, 7, 6, 0.48) 47%, rgba(10, 11, 10, 0.78) 100%),
        radial-gradient(ellipse 40% 115% at 70% 53%, rgba(196, 204, 196, 0.36) 0%, rgba(94, 102, 97, 0.2) 36%, transparent 68%),
        radial-gradient(ellipse 15% 95% at 22% 56%, rgba(208, 212, 206, 0.15) 0%, transparent 74%),
        linear-gradient(113deg, #050605 0 18%, #252927 18.5% 25%, #0a0b0a 26% 43%, #414642 44% 59%, #111311 60% 100%);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: -8%;
      z-index: -1;
      background:
        repeating-linear-gradient(90deg, transparent 0 46px, rgba(244, 241, 232, 0.018) 47px, transparent 49px),
        radial-gradient(circle at 61% 46%, rgba(255,255,255,.12), transparent 23%);
      filter: blur(18px);
      transform: scale(1.08);
    }

    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.2;
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,.03) 0 1px, transparent 1px 4px);
      mix-blend-mode: soft-light;
    }

    .top-rule {
      position: absolute;
      top: clamp(52px, 8.6vh, 72px);
      left: clamp(36px, 6.65vw, 80px);
      width: min(410px, calc(100vw - 72px));
      height: 1px;
      background: linear-gradient(90deg, var(--acid), rgba(185, 235, 139, 0));
    }

    .option-label {
      position: absolute;
      top: clamp(68px, 11.3vh, 88px);
      left: clamp(36px, 6.65vw, 80px);
      margin: 0;
      color: rgba(244, 241, 232, 0.66);
      font-size: clamp(9px, 0.9vw, 11px);
      font-weight: 500;
      letter-spacing: 0.18em;
      line-height: 1;
    }

    .back-button {
      position: absolute;
      top: clamp(105px, 17.5vh, 132px);
      left: clamp(36px, 6.65vw, 80px);
      display: inline-grid;
      grid-template-columns: 58px 1fr;
      align-items: stretch;
      width: 244px;
      min-height: 72px;
      padding: 0;
      border: 1px solid rgba(185, 235, 139, 0.75);
      border-radius: 0;
      background: rgba(10, 11, 10, 0.74);
      color: var(--paper);
      font: inherit;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
      box-shadow: inset 0 0 0 1px rgba(10, 11, 10, 0.85), 0 18px 50px rgba(0, 0, 0, 0.3);
      transition: color 180ms ease, background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .back-button::before,
    .back-button::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      pointer-events: none;
      transition: width 180ms ease, height 180ms ease;
    }

    .back-button::before {
      top: -1px;
      left: -1px;
      border-top: 3px solid var(--acid);
      border-left: 3px solid var(--acid);
    }

    .back-button::after {
      right: -1px;
      bottom: -1px;
      border-right: 3px solid var(--acid);
      border-bottom: 3px solid var(--acid);
    }

    .arrow-box {
      position: relative;
      display: grid;
      place-items: center;
      border-right: 1px solid rgba(185, 235, 139, 0.42);
      background: rgba(185, 235, 139, 0.06);
    }

    .arrow {
      position: relative;
      display: block;
      width: 23px;
      height: 1.5px;
      background: var(--acid);
      transform: translateX(1px);
      transition: width 180ms ease, transform 180ms ease;
    }

    .arrow::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 50%;
      width: 9px;
      height: 9px;
      border-left: 1.5px solid var(--acid);
      border-bottom: 1.5px solid var(--acid);
      transform: translateY(-50%) rotate(45deg);
    }

    .button-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 22px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.19em;
    }

    .button-index {
      color: var(--acid);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    .back-button:hover,
    .back-button:focus-visible {
      outline: none;
      color: var(--ink);
      background: var(--acid);
      transform: translate(-3px, -3px);
      box-shadow: 6px 6px 0 rgba(185, 235, 139, 0.22), 0 22px 55px rgba(0, 0, 0, 0.38);
    }

    .back-button:hover .arrow-box,
    .back-button:focus-visible .arrow-box {
      border-color: rgba(10, 11, 10, 0.32);
      background: rgba(10, 11, 10, 0.06);
    }

    .back-button:hover .arrow,
    .back-button:focus-visible .arrow {
      width: 28px;
      background: var(--ink);
      transform: translateX(-2px);
    }

    .back-button:hover .arrow::before,
    .back-button:focus-visible .arrow::before {
      border-color: var(--ink);
    }

    .back-button:hover .button-index,
    .back-button:focus-visible .button-index {
      color: var(--ink);
    }

    .back-button:active {
      transform: translate(0, 0);
      box-shadow: none;
    }

    .meta {
      position: absolute;
      left: clamp(36px, 6.65vw, 80px);
      bottom: clamp(34px, 7vh, 54px);
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(244, 241, 232, 0.35);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .meta-dot {
      width: 5px;
      height: 5px;
      background: var(--acid);
    }

    @media (max-width: 520px) {
      .top-rule { width: calc(100vw - 72px); }
      .back-button { width: min(244px, calc(100vw - 72px)); }
      .meta { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .back-button,
      .arrow { transition: none; }
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Propuesta visual de botón volver">
    <div class="top-rule" aria-hidden="true"></div>
    <p class="option-label">OPCIÓN A · MARCO EDITORIAL</p>

    <button class="back-button" type="button" aria-label="Volver al listado de proyectos">
      <span class="arrow-box" aria-hidden="true"><span class="arrow"></span></span>
      <span class="button-copy">
        <span>VOLVER</span>
        <span class="button-index" aria-hidden="true">03—01</span>
      </span>
    </button>

    <div class="meta" aria-hidden="true">
      <span class="meta-dot"></span>
      <span>Sistema de navegación / detalle de proyecto</span>
    </div>
  </main>
</body>
</html>
