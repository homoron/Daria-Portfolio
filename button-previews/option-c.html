<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opción C · Control de cámara</title>
  <style>
    :root {
      --ink: #0a0b0a;
      --paper: #f4f1e8;
      --acid: #b9eb8b;
      --line: rgba(244, 241, 232, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 1200px;
      height: 100%;
      min-height: 675px;
      margin: 0;
      overflow: hidden;
      background: var(--ink);
    }

    body {
      display: grid;
      place-items: center;
      color: var(--paper);
      font-family: "IBM Plex Mono", "Courier New", monospace;
    }

    .canvas {
      position: relative;
      width: 1200px;
      height: 675px;
      isolation: isolate;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.88) 0 15%, transparent 44%),
        radial-gradient(ellipse at 68% 48%, rgba(215, 215, 206, 0.24) 0 14%, transparent 44%),
        radial-gradient(ellipse at 47% 15%, rgba(244, 241, 232, 0.13) 0 8%, transparent 38%),
        linear-gradient(112deg, #090a09 3%, #1a1b19 35%, #555753 56%, #1b1d1a 78%, #080908 100%);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: -90px;
      z-index: -1;
      opacity: 0.58;
      filter: blur(32px);
      transform: rotate(-4deg) scale(1.08);
      background:
        linear-gradient(104deg, transparent 0 28%, rgba(0, 0, 0, 0.88) 29% 35%, transparent 36% 51%, rgba(245, 245, 238, 0.24) 52% 65%, transparent 66%),
        radial-gradient(circle at 24% 72%, rgba(185, 235, 139, 0.14), transparent 23%),
        repeating-linear-gradient(89deg, transparent 0 96px, rgba(255, 255, 255, 0.04) 97px 100px);
    }

    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0.23;
      mix-blend-mode: soft-light;
      background-image: repeating-radial-gradient(circle at 0 0, transparent 0 1px, rgba(255, 255, 255, 0.18) 1px 2px);
      background-size: 4px 4px;
    }

    .top-rule {
      position: absolute;
      top: 73px;
      left: 64px;
      right: 64px;
      height: 1px;
      background: linear-gradient(90deg, var(--acid) 0 58px, var(--line) 58px 100%);
    }

    .option-label {
      position: absolute;
      top: 94px;
      left: 65px;
      color: rgba(244, 241, 232, 0.7);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .back-control {
      --cut: 13px;
      position: absolute;
      top: 138px;
      left: 64px;
      display: grid;
      grid-template-columns: 66px 1fr;
      align-items: stretch;
      width: 282px;
      height: 76px;
      padding: 0;
      border: 0;
      color: var(--paper);
      background: transparent;
      font: inherit;
      cursor: pointer;
      filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.32));
    }

    .back-control::before,
    .back-control::after {
      content: "";
      position: absolute;
      pointer-events: none;
      clip-path: polygon(var(--cut) 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% calc(100% - var(--cut)), calc(100% - var(--cut)) 100%, var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cut));
    }

    .back-control::before {
      inset: 0;
      background: var(--acid);
    }

    .back-control::after {
      inset: 1px;
      background:
        linear-gradient(90deg, rgba(185, 235, 139, 0.08), transparent 52%),
        rgba(10, 11, 10, 0.92);
    }

    .arrow-cell,
    .control-label {
      position: relative;
      z-index: 1;
    }

    .arrow-cell {
      display: grid;
      place-items: center;
      margin: 9px 0 9px 9px;
      border-right: 1px solid rgba(185, 235, 139, 0.5);
      background: var(--acid);
      clip-path: polygon(9px 0, 100% 0, 100% 100%, 9px 100%, 0 calc(100% - 9px), 0 9px);
    }

    .arrow {
      position: relative;
      width: 25px;
      height: 16px;
      transform: translateX(1px);
    }

    .arrow::before {
      content: "";
      position: absolute;
      top: 7px;
      left: 1px;
      width: 23px;
      height: 2px;
      background: var(--ink);
    }

    .arrow::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 1px;
      width: 10px;
      height: 10px;
      border-left: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
      transform: rotate(45deg);
      transform-origin: center;
    }

    .control-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px 0 20px;
      overflow: hidden;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-align: left;
    }

    .control-label::after {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--acid);
      box-shadow: 0 0 0 3px rgba(185, 235, 139, 0.12);
    }

    .perforations {
      position: absolute;
      z-index: 2;
      left: 93px;
      bottom: 5px;
      display: flex;
      gap: 7px;
      pointer-events: none;
    }

    .perforations i {
      display: block;
      width: 10px;
      height: 3px;
      background: rgba(244, 241, 232, 0.26);
    }

    .back-control:hover::after,
    .back-control:focus-visible::after {
      background:
        linear-gradient(90deg, rgba(185, 235, 139, 0.17), transparent 68%),
        rgba(10, 11, 10, 0.97);
    }

    .back-control:hover .arrow,
    .back-control:focus-visible .arrow {
      transform: translateX(-3px);
      transition: transform 160ms steps(2, end);
    }

    .back-control:active {
      transform: translateY(2px);
    }

    .back-control:focus-visible {
      outline: 2px solid var(--paper);
      outline-offset: 5px;
    }

    .frame-code {
      position: absolute;
      left: 65px;
      bottom: 55px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: rgba(244, 241, 232, 0.46);
      font-size: 11px;
      letter-spacing: 0.14em;
    }

    .frame-code::before {
      content: "";
      width: 38px;
      height: 1px;
      background: var(--acid);
    }

    @media (prefers-reduced-motion: reduce) {
      .back-control,
      .arrow {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="canvas" aria-label="Propuesta de botón volver, opción C">
    <div class="top-rule" aria-hidden="true"></div>
    <div class="option-label">OPCIÓN C · CONTROL DE CÁMARA</div>

    <button class="back-control" type="button" aria-label="Volver">
      <span class="arrow-cell" aria-hidden="true"><span class="arrow"></span></span>
      <span class="control-label">VOLVER</span>
      <span class="perforations" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
    </button>

    <div class="frame-code" aria-hidden="true">FRAME 03 / 08 · RETURN</div>
  </main>
</body>
</html>
