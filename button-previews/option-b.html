<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opción B · Minimal editorial</title>
  <style>
    :root {
      --ink: #0a0b0a;
      --paper: #f4f1e8;
      --acid: #b9eb8b;
      --muted: rgba(244, 241, 232, 0.5);
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--ink);
    }

    body {
      display: grid;
      place-items: center;
      color: var(--paper);
      font-family: "IBM Plex Mono", "Courier New", monospace;
    }

    .canvas {
      position: relative;
      width: min(100vw, 1200px);
      aspect-ratio: 16 / 9;
      min-height: 420px;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(ellipse 42% 110% at 52% 62%, rgba(205, 210, 202, 0.22), transparent 68%),
        radial-gradient(ellipse 15% 75% at 16% 80%, rgba(255, 255, 255, 0.10), transparent 70%),
        linear-gradient(104deg, #060706 0 22%, #181a18 38%, #4c504b 63%, #171917 88%, #070807 100%);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: -16%;
      z-index: -2;
      opacity: 0.67;
      filter: blur(26px);
      transform: rotate(-7deg) scale(1.1);
      background:
        repeating-linear-gradient(92deg, transparent 0 76px, rgba(230, 235, 228, 0.08) 77px 87px, transparent 91px 154px),
        linear-gradient(132deg, transparent 0 31%, rgba(225, 229, 221, 0.2) 32% 38%, transparent 40% 100%);
    }

    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0.22;
      mix-blend-mode: soft-light;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.08) 0 1px, transparent 1px 4px),
        repeating-linear-gradient(90deg, transparent 0 3px, rgba(0,0,0,.1) 3px 4px);
    }

    .option-label {
      position: absolute;
      top: 68px;
      left: 72px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .option-label::before {
      content: "";
      display: inline-block;
      width: 28px;
      height: 1px;
      margin: 0 12px 4px 0;
      background: var(--acid);
    }

    .back-link {
      position: absolute;
      top: 156px;
      left: 72px;
      display: grid;
      grid-template-columns: 74px auto;
      grid-template-rows: auto auto;
      column-gap: 22px;
      row-gap: 9px;
      width: 314px;
      padding: 16px 0 12px;
      color: var(--paper);
      text-decoration: none;
      border: 0;
      outline: none;
    }

    .arrow {
      position: relative;
      grid-row: 1 / 3;
      align-self: center;
      display: block;
      width: 68px;
      height: 18px;
      color: var(--acid);
      transition: transform 220ms cubic-bezier(.2,.8,.2,1);
    }

    .arrow::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 64px;
      height: 2px;
      background: currentColor;
      transform: translateY(-50%);
    }

    .arrow::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 1px;
      width: 15px;
      height: 15px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: translateY(-50%) rotate(45deg);
      transform-origin: center;
    }

    .back-label {
      position: relative;
      align-self: end;
      width: max-content;
      font-size: 27px;
      font-weight: 500;
      letter-spacing: 0.17em;
      line-height: 1;
    }

    .back-label::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: -14px;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--acid) 0 74%, rgba(185, 235, 139, 0.18) 74% 100%);
      transform-origin: left;
      transition: transform 220ms ease;
    }

    .project-code {
      align-self: start;
      margin-top: 10px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .project-code strong {
      color: var(--acid);
      font-weight: 500;
    }

    .back-link:hover .arrow,
    .back-link:focus-visible .arrow {
      transform: translateX(-8px);
    }

    .back-link:hover .back-label::after,
    .back-link:focus-visible .back-label::after {
      transform: scaleX(0.72);
    }

    .back-link:focus-visible {
      outline: 1px solid var(--acid);
      outline-offset: 10px;
    }

    .film-mark {
      position: absolute;
      right: 54px;
      bottom: 42px;
      color: rgba(244, 241, 232, 0.34);
      font-size: 10px;
      letter-spacing: 0.24em;
      writing-mode: vertical-rl;
    }

    @media (max-width: 640px) {
      .canvas {
        width: 100vw;
        min-height: 100vh;
        aspect-ratio: auto;
      }

      .option-label {
        top: 44px;
        left: 28px;
        font-size: 10px;
      }

      .back-link {
        top: 116px;
        left: 28px;
        grid-template-columns: 55px auto;
        column-gap: 16px;
        width: 270px;
      }

      .arrow {
        width: 51px;
      }

      .arrow::before { width: 48px; }

      .back-label {
        font-size: 23px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .arrow,
      .back-label::after { transition: none; }
    }
  </style>
</head>
<body>
  <main class="canvas">
    <p class="option-label">OPCIÓN B · MINIMAL EDITORIAL</p>

    <a class="back-link" href="#" aria-label="Volver al listado de proyectos">
      <span class="arrow" aria-hidden="true"></span>
      <span class="back-label">VOLVER</span>
      <span class="project-code"><strong>03</strong> / archivo de proyectos</span>
    </a>

    <span class="film-mark" aria-hidden="true">DARIA / PORTFOLIO / 2026</span>
  </main>
</body>
</html>
